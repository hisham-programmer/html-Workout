<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table </title>
</head>
<body>
    <center>
    <h3>Product Information</h3>
    <form action="" method="post">
        <table border="2" align="center" cellpadding="10"   >
        <tr>
            <td>
                <label for="productname">Product Name:</label>
            </td>
            <td>
                <input type="text" name="Productname" id="productname"/>
            </td>
        </tr>
        <tr>
            <td>
                <label for="productsize">Product Size:</label>
            </td>
            <td>
                <input type="number" name="Productsize" id="productsize"/>
            </td>
        </tr>
        <tr>
            <td>
                <label for="supportemail">Support Email:</label>
            </td>
            <td>
                <input type="email" name="Supportemail" id="supportemail"/>
            </td>
        </tr>
        <tr>
            <td>
                <label for="Manufacture-Date">Manufacture Date:</label>
            </td>
            <td>
                <input type="date" name="Manufacture-Date" id="Manufacture-Date"/>
            </td>
        </tr>
        <tr>
            <td>
                <label for="expiry-date">Expiry Date:</label>
            </td>
            <td>
                <input type="date" name="ExpiryDate" id="expiry-date"/>
            </td>
        </tr>
        <tr>
            <td>
                <label for="productprice">Product Price:</label>
            </td>
            <td>
                <input type="number" name="Productprice" id="productprice"/>
            </td>
        </tr>
        <tr>
            <td>
                <label for="productimage">Product Image:</label>
            </td>
            <td>
                <input type="file" name="Productimage" id="productimage"/>
            </td>
        </tr>
        <tr>
            <td colspan="2">
                <label for="Quality">Quality:</label>
                <select name="Quality" id="Quality">
                    <option value="select">Select</option>
                    <option value="Quality-1"name="Quality-1">Quality-1</option> 
                    <option value="Quality-2"name="Quality-2">Quality-2</option>
                    <option value="Quality-3"name="Quality-3">Quality-3</option>  
                </select>
            </td>
        </tr>
        <br/>
            <tr >
            <td align="center" colspan="2">
                <button type="submit" name="submit" style="color: rgb(244, 0, 0);background-color: rgb(0, 255, 4);">Submit</button>
            </td>
        </tr>
        </table>
    </form>
    </center>
</body>
</html>
