<!DOCTYPE html>
<html>
<head>
    <title>Exam Registration Form</title>
    <link rel="icon" type="image/png" href="./assets/tn-image.jpeg">
</head>
<body style="background-color:#FFF8DC; font-family:Arial, sans-serif;">
<a href="./form.html" ><img src="./assets/back.png" alt="Back to Form Tag Task" width="50px" height="50px" style="margin: 10px;"></a>
<center>
    <img src="./assets/tn-image.jpeg" alt="TNPSC Logo" width="100" height="100">

    <h1 style="color:indigo;">GOVERNMENT OF TAMIL NADU</h1>

    <h2 style="color:white; background-color:black; display:inline-block; padding:8px 20px; border-radius:5px;">
        EXAMINATION REGISTRATION FORM
    </h2>
</center>

<br>

<div>
    <marquee style="background-color:lightseagreen; color:white; padding:10px; font-weight:bold;">
         Last Date for Exam Registration: 31-07-2026
    </marquee>
</div>

<br>

<form method="post">

<table border="1" align="center" cellpadding="10" cellspacing="0"
style="background-color:#FFFFFF; width:60%; border-collapse:collapse; border:2px solid black;">

<tr>
    <th colspan="2" style="background-color:hsl(0, 0%, 0%); color:white;">
        <h2>Candidate Details</h2>
    </th>
</tr>

<tr>
    <td style="background-color:lightseagreen; color:white;">Candidate Name</td>
    <td style="background-color:#FFFDEB;">
        <input type="text" required>
    </td>
</tr>

<tr>
    <td style="background-color:lightseagreen; color:white;">Father's Name</td>
    <td style="background-color:#FFFDEB;">
        <input type="text" required>
    </td>
</tr>

<tr>
    <td style="background-color:lightseagreen; color:white;">Date of Birth</td>
    <td style="background-color:#FFFDEB;">
        <input type="date" required>
    </td>
</tr>

<tr>
    <td style="background-color:lightseagreen; color:white;">Gender</td>
    <td style="background-color:#FFFDEB;">
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <input type="radio" name="gender"> Other
    </td>
</tr>

<tr>
    <td style="background-color:lightseagreen; color:white;">Email</td>
    <td style="background-color:#FFFDEB;">
        <input type="email" required>
    </td>
</tr>

<tr>
    <td style="background-color:lightseagreen; color:white;">Mobile Number</td>
    <td style="background-color:#FFFDEB;">
        <input type="tel" maxlength="10" required>
    </td>
</tr>

<tr>
    <td style="background-color:lightseagreen; color:white;">Aadhaar Number</td>
    <td style="background-color:#FFFDEB;">
        <input type="text" maxlength="12" required>
    </td>
</tr>

<tr>
    <td style="background-color:lightseagreen; color:white;">Community</td>
    <td style="background-color:#FFFDEB;">
        <select required>
            <option>Select</option>
            <option>OC</option>
            <option>BC</option>
            <option>MBC</option>
            <option>SC</option>
            <option>ST</option>
        </select>
    </td>
</tr>

<tr>
    <td style="background-color:lightseagreen; color:white;">Qualification</td>
    <td style="background-color:#FFFDEB;">
        <select required>
            <option>Select</option>
            <option>10th</option>
            <option>12th</option>
            <option>Diploma</option>
            <option>UG</option>
            <option>PG</option>
        </select>
    </td>
</tr>

<tr>
    <td style="background-color:lightseagreen; color:white;">Exam Centre</td>
    <td style="background-color:#FFFDEB;">
        <select required>
            <option>Select</option>
            <option>Chennai</option>
            <option>Coimbatore</option>
            <option>Madurai</option>
            <option>Trichy</option>
            <option>Salem</option>
        </select>
    </td>
</tr>

<tr>
    <td style="background-color:lightseagreen; color:white;">Upload Photo</td>
    <td style="background-color:#FFFDEB;">
        <input type="file" required>
    </td>
</tr>

<tr>
    <td style="background-color:lightseagreen; color:white;">Upload Signature</td>
    <td style="background-color:#FFFDEB;">
        <input type="file" required>
    </td>
</tr>

<tr>
    <td style="background-color:lightseagreen; color:white;">Address</td>
    <td style="background-color:#FFFDEB;">
        <textarea rows="4" cols="30"></textarea>
    </td>
</tr>

<tr>
    <td colspan="2" align="center" style="background-color:#FFF8DC;">

        <button type="submit"
        style="background-color:lightseagreen; color:white; padding:10px 20px; border:none; border-radius:5px;">
            Submit
        </button>

        &nbsp;&nbsp;

        <button type="reset"
        style="background-color:black; color:white; padding:10px 20px; border:none; border-radius:5px;">
            Reset
        </button>

    </td>
</tr>

</table>

</form>

</body>
</html>
